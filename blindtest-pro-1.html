<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎵 BLINDTEST PRO</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%}
:root{
  --bg:#07070f;--bg2:#0e0e1e;--bg3:#161628;
  --border:rgba(139,92,246,.3);
  --p:#8b5cf6;--p2:#a78bfa;
  --c:#06b6d4;--c2:#22d3ee;
  --y:#fbbf24;--g:#22c55e;--r:#ef4444;
  --tx:#e2e8f0;--tx2:#94a3b8;
  --gp:0 0 24px rgba(139,92,246,.5);
  --gc:0 0 24px rgba(6,182,212,.5);
  --gy:0 0 24px rgba(251,191,36,.5);
}
body{background:var(--bg);color:var(--tx);font-family:'Courier New',monospace;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 15% 40%,rgba(139,92,246,.07),transparent 55%),radial-gradient(ellipse at 85% 60%,rgba(6,182,212,.05),transparent 55%);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.04) 3px,rgba(0,0,0,.04) 4px);pointer-events:none;z-index:999}
#app{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column}
.screen{flex:1;padding:20px;max-width:860px;margin:0 auto;width:100%;animation:fadeIn .25s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes pop{0%{transform:scale(.5);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
@keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}
@keyframes blink{50%{opacity:0}}

h1{font-family:Impact,'Arial Black',sans-serif;font-size:clamp(2rem,7vw,4.5rem);letter-spacing:6px;text-transform:uppercase;line-height:1}
h2{font-family:Impact,'Arial Black',sans-serif;font-size:clamp(1.2rem,4vw,2.2rem);letter-spacing:3px;text-transform:uppercase}
h3{font-size:.8rem;text-transform:uppercase;letter-spacing:2px;color:var(--tx2);margin-bottom:8px}

.neon-p{color:var(--p);text-shadow:var(--gp)}
.neon-c{color:var(--c);text-shadow:var(--gc)}
.neon-y{color:var(--y);text-shadow:var(--gy)}

.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:14px}
.card-glow{box-shadow:var(--gp),inset 0 1px 0 rgba(255,255,255,.04)}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 22px;border:none;border-radius:8px;font-family:'Courier New',monospace;font-size:.82rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;cursor:pointer;transition:all .12s ease;user-select:none;-webkit-user-select:none}
.btn:active{transform:scale(.96)}
.btn-p{background:var(--p);color:#fff;box-shadow:var(--gp)}
.btn-p:hover{background:var(--p2)}
.btn-c{background:transparent;color:var(--c);border:1.5px solid var(--c);box-shadow:var(--gc)}
.btn-c:hover{background:rgba(6,182,212,.1)}
.btn-g{background:var(--g);color:#fff}
.btn-g:hover{background:#16a34a}
.btn-r{background:var(--r);color:#fff}
.btn-y{background:var(--y);color:#000;box-shadow:var(--gy)}
.btn-y:hover{background:#fde68a}
.btn-ghost{background:transparent;color:var(--tx2);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--p);color:var(--p)}
.btn-lg{padding:16px 36px;font-size:.95rem}
.btn-full{width:100%}
.btn-sm{padding:7px 14px;font-size:.72rem}
.btn:disabled{opacity:.35;cursor:not-allowed;box-shadow:none;transform:none}

.seg{display:flex;background:var(--bg3);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.seg-btn{flex:1;padding:9px 6px;background:transparent;border:none;color:var(--tx2);font-family:'Courier New',monospace;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;cursor:pointer;transition:all .15s}
.seg-btn:hover:not(.active){background:rgba(255,255,255,.04)}
.seg-btn.active{background:var(--p);color:#fff}

input[type=text]{background:var(--bg3);border:1.5px solid var(--border);border-radius:8px;padding:11px 14px;color:var(--tx);font-family:'Courier New',monospace;font-size:1rem;width:100%;outline:none;transition:border-color .2s}
input[type=text]:focus{border-color:var(--c);box-shadow:var(--gc)}
input[type=text].inp-p:focus{border-color:var(--p);box-shadow:var(--gp)}

.prog-bar{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--p),var(--c));transition:width .1s linear;border-radius:3px}

.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:1px}
.badge-p{background:rgba(139,92,246,.25);color:var(--p)}
.badge-c{background:rgba(6,182,212,.25);color:var(--c)}
.badge-y{background:rgba(251,191,36,.25);color:var(--y)}
.badge-r{background:rgba(239,68,68,.25);color:var(--r)}
.badge-g{background:rgba(34,197,94,.25);color:var(--g)}

.vinyl{width:70px;height:70px;border-radius:50%;background:conic-gradient(#1a1a2e 0 33%,#222 33% 66%,#1a1a2e 66%);border:3px solid #333;position:relative;flex-shrink:0}
.vinyl::before{content:'';position:absolute;inset:50%;transform:translate(-50%,-50%);width:22px;height:22px;background:radial-gradient(circle,#444 40%,#222 40%);border-radius:50%}
.vinyl.spin{animation:spin 2s linear infinite}

.drop-zone{border:2px dashed var(--border);border-radius:12px;padding:32px 20px;text-align:center;cursor:pointer;transition:all .2s;position:relative}
.drop-zone:hover{border-color:var(--p);background:rgba(139,92,246,.05)}
.drop-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}

.choices-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.choice-btn{padding:14px 12px;background:var(--bg3);border:2px solid var(--border);border-radius:10px;color:var(--tx);font-family:'Courier New',monospace;font-size:.85rem;cursor:pointer;transition:all .12s;text-align:left;word-break:break-word;display:flex;align-items:center;gap:8px;user-select:none}
.choice-btn:hover:not(:disabled):not(.locked){border-color:var(--c);background:rgba(6,182,212,.08);color:var(--c)}
.choice-btn.correct{border-color:var(--g)!important;background:rgba(34,197,94,.15)!important;color:var(--g)!important}
.choice-btn.wrong{border-color:var(--r)!important;background:rgba(239,68,68,.1)!important;color:var(--r)!important}
.choice-btn.locked{cursor:default}
.choice-key{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;background:rgba(255,255,255,.1);border-radius:4px;font-size:.7rem;font-weight:700;flex-shrink:0}

.lyrics-cont{font-size:1rem;line-height:2.2;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px 24px;max-height:55vh;overflow-y:auto}
.blank-btn{display:inline-block;min-width:70px;padding:1px 6px;background:rgba(139,92,246,.12);border:1.5px dashed var(--p);border-radius:4px;color:var(--p);cursor:pointer;font-family:'Courier New',monospace;font-size:.95rem;text-align:center;transition:all .15s;vertical-align:middle}
.blank-btn:hover{background:rgba(139,92,246,.25);border-style:solid}
.blank-btn.answered{border-style:solid;cursor:default}
.blank-btn.correct{border-color:var(--g);background:rgba(34,197,94,.12);color:var(--g)}
.blank-btn.wrong{border-color:var(--r);background:rgba(239,68,68,.1);color:var(--r)}
.blank-btn.revealed{border-color:var(--y);background:rgba(251,191,36,.1);color:var(--y)}
.blank-input{display:inline-block;min-width:80px;border:none;border-bottom:2px solid var(--p);background:transparent;color:var(--c);font-family:'Courier New',monospace;font-size:.95rem;padding:0 4px;outline:none;text-align:center;transition:border-color .2s;vertical-align:middle}
.blank-input:focus{border-bottom-color:var(--c)}
.blank-input.correct{border-bottom-color:var(--g);color:var(--g)}
.blank-input.wrong{border-bottom-color:var(--r);color:var(--r)}
.blank-input.revealed{border-bottom-color:var(--y);color:var(--y)}

.lyric-choices-popup{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px;margin:6px 0;display:grid;grid-template-columns:1fr 1fr;gap:6px;animation:pop .2s ease-out}

.duel-scores{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.player-card{background:var(--bg2);border:2px solid var(--border);border-radius:12px;padding:14px;text-align:center;transition:all .2s}
.player-card.active{border-color:var(--p);box-shadow:var(--gp)}
.player-card.p2-active{border-color:var(--c);box-shadow:var(--gc)}
.player-name{font-size:.75rem;letter-spacing:2px;text-transform:uppercase;color:var(--tx2);margin-bottom:4px}
.player-score{font-family:Impact,sans-serif;font-size:2.2rem}

.timer-wrap{position:relative;width:70px;height:70px;flex-shrink:0}
.timer-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:Impact,sans-serif;font-size:1.4rem;color:var(--c)}
.timer-text.urgent{color:var(--r);animation:blink .5s ease-in-out infinite}

.buzzer-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
.buzzer-btn{padding:20px;font-family:Impact,sans-serif;font-size:1.3rem;letter-spacing:3px;border:none;border-radius:12px;cursor:pointer;transition:all .1s;text-transform:uppercase;user-select:none}
.buzzer-btn:active{transform:scale(.93)}
.bz-p1{background:var(--p);color:#fff;box-shadow:var(--gp)}
.bz-p2{background:var(--c);color:#000;box-shadow:var(--gc)}
.buzzer-btn:disabled{opacity:.3;cursor:not-allowed;transform:none;box-shadow:none}

.feedback-overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:200}
.feedback-txt{font-family:Impact,sans-serif;font-size:clamp(3rem,10vw,6rem);letter-spacing:4px;text-transform:uppercase;animation:pop .5s ease-out forwards;text-shadow:0 0 40px currentColor}

.reveal-banner{background:rgba(34,197,94,.12);border:1.5px solid var(--g);border-radius:10px;padding:12px 16px;color:var(--g);font-size:.9rem;margin-top:10px;animation:pop .3s ease-out}
.wrong-banner{background:rgba(239,68,68,.1);border:1.5px solid var(--r);border-radius:10px;padding:12px 16px;color:var(--r);font-size:.9rem;margin-top:10px;animation:pop .3s ease-out}

.divider{border:none;border-top:1px solid var(--border);margin:16px 0}
.flex{display:flex}.flex-col{flex-direction:column}.items-center{align-items:center}.justify-center{justify-content:center}.justify-between{justify-content:space-between}.gap-2{gap:8px}.gap-3{gap:12px}.gap-4{gap:16px}.flex-1{flex:1}.w-full{width:100%}.text-center{text-align:center}
.mb-1{margin-bottom:4px}.mb-2{margin-bottom:8px}.mb-3{margin-bottom:12px}.mb-4{margin-bottom:16px}.mb-6{margin-bottom:24px}.mt-2{margin-top:8px}.mt-3{margin-top:12px}.mt-4{margin-top:16px}
.text-sm{font-size:.8rem}.text-xs{font-size:.72rem}.text-dim{color:var(--tx2)}
.bold{font-weight:700}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:rgba(139,92,246,.4);border-radius:2px}
@media(max-width:600px){.choices-grid{grid-template-columns:1fr}.duel-scores{grid-template-columns:1fr 1fr}.buzzer-row{grid-template-columns:1fr 1fr}}
</style>

<body>
<div id="app"></div>
<div id="feedback-layer" class="feedback-overlay" style="display:none"></div>

<script>
// ╔══════════════════════════════════════════════════════════╗
// ║                     CONSTANTS                            ║
// ╚══════════════════════════════════════════════════════════╝
const SKIP = new Set(
  'le la les un une des du de d l j et en à a au aux ce se je tu il elle on nous vous ils elles me te lui y ne pas plus que qui quoi ou où car mais donc or ni si mon ton son ma ta sa nos vos leurs leur par pour sur sous dans avec sans est sont ont ai as ya c m t s n qu'.split(' ')
);

const BT_DIFF = {
  facile:    { dur:30, replays:3, pts:1,  label:'Facile',        icon:'🟢', hint:'30s • 3 réécoutes' },
  inter:     { dur:20, replays:2, pts:2,  label:'Intermédiaire', icon:'🟡', hint:'20s • 2 réécoutes' },
  difficile: { dur:10, replays:1, pts:3,  label:'Difficile',     icon:'🟠', hint:'10s • 1 réécoute' },
  hard:      { dur:5,  replays:0, pts:5,  label:'HARD',          icon:'🔴', hint:'5s • 0 réécoute' },
};

const LY_DIFF = {
  facile: { pct:.20, label:'Facile',        icon:'🟢', hint:'20% des mots' },
  inter:  { pct:.40, label:'Intermédiaire', icon:'🟡', hint:'40% des mots' },
  hard:   { pct:.60, label:'Difficile',     icon:'🟠', hint:'60% des mots' },
  god:    { pct:.85, label:'GOD MODE',      icon:'💀', hint:'85% des mots' },
};

// ╔══════════════════════════════════════════════════════════╗
// ║                       STATE                              ║
// ╚══════════════════════════════════════════════════════════╝
let S = {
  screen: 'home',
  songs: [],
  lyricsFiles: [],
  players: ['Joueur 1', 'Joueur 2'],

  btCfg: { diff:'facile', start:'debut', mode:'solo', answer:'qcm', ziak:true, field:'artist', rounds:10 },
  btGame: null,

  lyCfg: { diff:'inter', mode:'qcm' },
  lyGame: null,
};

let _audio = null, _audioTimer = null, _uiTimer = null;

// ╔══════════════════════════════════════════════════════════╗
// ║               FOLDER MEMORY (File System API)            ║
// ╚══════════════════════════════════════════════════════════╝
let _musicDirHandle = null;
let _lyricsDirHandle = null;
const FS_SUPPORTED = typeof window.showDirectoryPicker === 'function';

async function pickMusicFolder() {
  if (!FS_SUPPORTED) { document.getElementById('audio-input').click(); return; }
  try {
    _musicDirHandle = await window.showDirectoryPicker({ mode:'read' });
    await loadFilesFromDir(_musicDirHandle, 'audio');
  } catch(e) { if (e.name !== 'AbortError') console.warn(e); }
}

async function pickLyricsFolder() {
  if (!FS_SUPPORTED) { document.getElementById('ly-txt-input') && document.getElementById('ly-txt-input').click(); return; }
  try {
    _lyricsDirHandle = await window.showDirectoryPicker({ mode:'read' });
    await loadFilesFromDir(_lyricsDirHandle, 'lyrics');
  } catch(e) { if (e.name !== 'AbortError') console.warn(e); }
}

async function reloadMusicFolder() {
  if (_musicDirHandle) await loadFilesFromDir(_musicDirHandle, 'audio');
}
async function reloadLyricsFolder() {
  if (_lyricsDirHandle) await loadFilesFromDir(_lyricsDirHandle, 'lyrics');
}

async function loadFilesFromDir(dirHandle, type) {
  const files = [];
  for await (const entry of dirHandle.values()) {
    if (entry.kind === 'file') {
      try {
        const f = await entry.getFile();
        files.push(f);
      } catch(e) {}
    }
  }
  if (type === 'audio') handleAudioFiles(files);
  else handleLyricsFiles(files);
}

// ╔══════════════════════════════════════════════════════════╗
// ║                    LEADERBOARD                           ║
// ╚══════════════════════════════════════════════════════════╝
function loadLeaderboard() {
  try { return JSON.parse(localStorage.getItem('bt_leaderboard') || '[]'); } catch(e) { return []; }
}
function saveLeaderboard(lb) {
  try { localStorage.setItem('bt_leaderboard', JSON.stringify(lb)); } catch(e) {}
}
function addLeaderboardEntry(name, score, total, mode, diff) {
  const lb = loadLeaderboard();
  lb.push({ name: name || 'Anonyme', score, total, mode, diff, date: new Date().toLocaleDateString('fr-FR') });
  lb.sort((a,b) => (b.score/b.total) - (a.score/a.total));
  if (lb.length > 50) lb.splice(50);
  saveLeaderboard(lb);
}

function promptAndSaveScore(score, total, mode, diff, cb) {
  const name = prompt(`💾 Enregistrer ton score (${score}/${total}) dans le classement ?\nEntre ton pseudo (ou annule pour ne pas sauvegarder) :`, '');
  if (name !== null) {
    addLeaderboardEntry(name, score, total, mode, diff);
    alert('✅ Score enregistré !');
  }
  if (cb) cb();
}

function renderLeaderboard() {
  const lb = loadLeaderboard();
  const rows = lb.length === 0
    ? `<p class="text-dim text-center" style="padding:20px">Aucun score enregistré</p>`
    : lb.map((e,i) => {
        const pct = e.total > 0 ? Math.round((e.score/e.total)*100) : 0;
        const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
        return `<div class="flex justify-between items-center" style="padding:10px 0;border-bottom:1px solid var(--border)">
          <span style="min-width:28px;font-family:Impact,sans-serif;color:var(--y)">${medal||'#'+(i+1)}</span>
          <span class="flex-1 bold">${escHtml(e.name)}</span>
          <span class="badge badge-p">${e.score}/${e.total}</span>
          <span class="badge badge-c" style="margin-left:6px">${pct}%</span>
          <span class="text-xs text-dim" style="margin-left:8px">${e.date}</span>
        </div>`;
      }).join('');
  return `<div class="screen">
  <div class="flex items-center gap-3 mb-6">
    <button class="btn btn-ghost btn-sm" onclick="goto('home')">← Retour</button>
    <h2 class="neon-y">🏆 Classement</h2>
  </div>
  <div class="card">${rows}</div>
  ${lb.length > 0 ? `<div class="text-center mt-2">
    <button class="btn btn-r btn-sm" onclick="if(confirm('Effacer tout le classement ?')){saveLeaderboard([]);goto('leaderboard')}">🗑 Effacer</button>
  </div>` : ''}
</div>`;
}

// ╔══════════════════════════════════════════════════════════╗
// ║                 AUDIO ENGINE                             ║
// ╚══════════════════════════════════════════════════════════╝
function stopAudio() {
  if (_audio) { try { _audio.pause(); } catch(e){} _audio.src = ''; _audio = null; }
  clearTimeout(_audioTimer);
  clearInterval(_uiTimer);
}

function playSegment(url, startMode, duration, { onEnd, onTick, onPlay } = {}) {
  stopAudio();
  _audio = new Audio(url);
  _audio.addEventListener('loadedmetadata', () => {
    const total = _audio.duration || 200;
    const maxStart = Math.max(0, total - duration - 3);
    const startAt = startMode === 'aleatoire' ? Math.random() * maxStart : 0;
    _audio.currentTime = startAt;
    _audio.play().catch(()=>{});
    onPlay && onPlay();
    let rem = duration;
    onTick && onTick(rem, duration);
    _uiTimer = setInterval(() => {
      rem = Math.max(0, rem - 0.1);
      onTick && onTick(rem, duration);
      if (rem <= 0) {
        clearInterval(_uiTimer);
        stopAudio();
        onEnd && onEnd();
      }
    }, 100);
  });
  _audio.addEventListener('error', () => { stopAudio(); onEnd && onEnd(); });
}

function pauseAudio() {
  if (_audio) _audio.pause();
  clearInterval(_uiTimer);
}

// ╔══════════════════════════════════════════════════════════╗
// ║                FILE LOADING                              ║
// ╚══════════════════════════════════════════════════════════╝
function parseName(filename) {
  const name = filename.replace(/\.[^.]+$/, '');
  const i = name.indexOf(' - ');
  if (i > -1) return { artist: name.slice(0, i).trim(), title: name.slice(i + 3).trim() };
  return { artist: 'Inconnu', title: name.trim() };
}

function handleAudioFiles(files) {
  const arr = Array.from(files).filter(f => /\.(mp3|wav|ogg|m4a|flac|aac|webm)$/i.test(f.name) || f.type.startsWith('audio/'));
  S.songs = arr.map(f => {
    const { artist, title } = parseName(f.name);
    return { file: f, name: f.name, url: URL.createObjectURL(f), artist, title };
  });
  render();
}

function handleLyricsFiles(files) {
  const arr = Array.from(files).filter(f => /\.txt$/i.test(f.name));
  let done = 0;
  S.lyricsFiles = arr.map(f => ({ file: f, name: f.name.replace(/\.txt$/i, ''), text: null }));
  if (!arr.length) { render(); return; }
  arr.forEach((f, i) => {
    const r = new FileReader();
    r.onload = e => { S.lyricsFiles[i].text = e.target.result; if (++done === arr.length) render(); };
    r.onerror = () => { if (++done === arr.length) render(); };
    r.readAsText(f, 'UTF-8');
  });
}

// ╔══════════════════════════════════════════════════════════╗
// ║              LYRICS PARSING ENGINE                       ║
// ╚══════════════════════════════════════════════════════════╝
function tokenizeLyrics(text) {
  // Remove content between [] and () — stage directions, annotations, etc.
  text = text.replace(/\[[^\]]*\]/g, '').replace(/\([^)]*\)/g, '');
  const tokens = [];
  const re = /([A-Za-zÀ-ÿ0-9]+(?:[''''][A-Za-zÀ-ÿ0-9]+)*)|(\r?\n)|([^\w\n])/g;
  let m;
  while ((m = re.exec(text)) !== null) {
    if (m[1]) {
      // Check if word contains apostrophe (e.g. "d'amour" or "j'ai")
      const word = m[1];
      const apoIdx = word.search(/['''']/);
      if (apoIdx > 0) {
        const prefix = word.slice(0, apoIdx + 1);
        const rest = word.slice(apoIdx + 1);
        tokens.push({ type: 'skip', val: prefix });
        if (rest) tokens.push({ type: 'word', val: rest, lower: rest.toLowerCase() });
      } else {
        tokens.push({ type: 'word', val: word, lower: word.toLowerCase() });
      }
    } else if (m[2]) {
      tokens.push({ type: 'newline', val: '\n' });
    } else if (m[3] === ' ' || m[3] === '\t') {
      tokens.push({ type: 'space', val: m[3] });
    } else {
      tokens.push({ type: 'punct', val: m[3] });
    }
  }
  return tokens;
}

function norm(s) {
  return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[''']/g,"'").trim();
}

function isEligible(token) {
  return token.type === 'word' && !SKIP.has(token.lower) && token.val.length > 2 && !/^\d+$/.test(token.val);
}

function createBlanks(tokens, pct) {
  const eligible = tokens.map((t,i)=>({t,i})).filter(({t})=>isEligible(t));
  const n = Math.max(1, Math.round(eligible.length * pct));
  const chosen = eligible.slice().sort(()=>Math.random()-.5).slice(0, n);
  const blankSet = new Set(chosen.map(x=>x.i));

  // Collect all eligible words for QCM pool
  const wordPool = eligible.map(x=>x.t.val).filter((v,i,a)=>a.findIndex(w=>norm(w)===norm(v))===i);

  let bid = 0;
  const blanks = {};
  const tagged = tokens.map((t,i) => {
    if (blankSet.has(i)) {
      const id = bid++;
      const choices = genWordChoices(t.val, wordPool, 4);
      blanks[id] = { answer: t.val, userAnswer: '', correct: null, choices, revealed: false };
      return { ...t, blank: true, blankId: id };
    }
    return { ...t, blank: false };
  });
  return { tokens: tagged, blanks, total: bid };
}

function genWordChoices(correct, pool, n = 4) {
  const wrong = pool.filter(w => norm(w) !== norm(correct)).sort(()=>Math.random()-.5).slice(0, n-1);
  while (wrong.length < n-1) wrong.push(correct.split('').sort(()=>Math.random()-.5).join('').toLowerCase());
  return [...wrong, correct].sort(()=>Math.random()-.5);
}

// ╔══════════════════════════════════════════════════════════╗
// ║              BLIND TEST GAME LOGIC                       ║
// ╚══════════════════════════════════════════════════════════╝
function allArtists() {
  return [...new Set(S.songs.map(s => s.artist))];
}

function genSongChoices(song) {
  const field = S.btCfg.field;
  const correctVal = song[field];
  let pool;
  if (field === 'artist') {
    pool = allArtists().filter(a => a !== correctVal);
  } else {
    pool = S.songs.map(s => s.title).filter(t => t !== correctVal);
    pool = [...new Set(pool)];
  }
  // Ziak trap
  if (S.btCfg.ziak && correctVal !== 'Ziak' && !pool.includes('Ziak')) {
    pool.push('Ziak');
  }
  let wrong = pool.sort(()=>Math.random()-.5).slice(0, 3);
  while (wrong.length < 3) wrong.push(`???${wrong.length}`);
  return [...wrong, correctVal].sort(()=>Math.random()-.5);
}

function initBTGame() {
  if (!S.songs.length) return;
  const diff = BT_DIFF[S.btCfg.diff];
  const queue = S.songs.slice().sort(()=>Math.random()-.5).slice(0, Math.min(S.songs.length, S.btCfg.rounds));
  S.btGame = {
    queue, idx: 0,
    scores: [0, 0],
    phase: 'ready', // ready | playing | buzzed | answered | done
    currentPlayer: 0,
    buzzer: null, // who buzzed (duel)
    firstWrong: null, // who buzzed first (for steal)
    choices: [],
    answerResult: null, // 'correct'|'wrong'
    replaysLeft: diff.replays,
    timeLeft: diff.dur,
    correctAnswer: '',
    duelBothAnswered: false,
  };
  goto('bt-game');
}

function btSong() { return S.btGame ? S.btGame.queue[S.btGame.idx] : null; }

function btStartPlay(replayMode = false) {
  const g = S.btGame;
  const diff = BT_DIFF[S.btCfg.diff];
  const song = btSong();
  if (!song) return;
  if (!replayMode) {
    g.choices = genSongChoices(song);
    g.correctAnswer = song[S.btCfg.field];
    g.answerResult = null;
    g.buzzer = null;
    g.firstWrong = null;
  }
  g.phase = 'playing';
  if (!replayMode && S.btCfg.mode === 'solo') {
    // Show input immediately while playing
  }
  updateBTGameRender();

  playSegment(song.url, S.btCfg.start, diff.dur, {
    onTick: (rem, total) => {
      g.timeLeft = rem;
      updateTimerEl(rem, total);
    },
    onEnd: () => {
      g.phase = 'waiting';
      g.timeLeft = 0;
      updateBTGameRender();
    }
  });
}

function btCheckAnswer(val) {
  const g = S.btGame;
  const song = btSong();
  const correct = norm(val) === norm(song[S.btCfg.field]);

  if (S.btCfg.mode === 'solo') {
    stopAudio();
    const diff = BT_DIFF[S.btCfg.diff];
    if (correct) { g.scores[0] += diff.pts; g.answerResult = 'correct'; }
    else { g.answerResult = 'wrong'; }
    g.phase = 'answered';
    updateBTGameRender();
    showFeedback(correct ? '✓ CORRECT' : '✗ FAUX', correct ? '#22c55e' : '#ef4444');
    setTimeout(() => btNextRound(), 2200);

  } else {
    // Duel buzzer mode
    const player = g.buzzer;
    const diff = BT_DIFF[S.btCfg.diff];
    stopAudio();
    if (correct) {
      g.scores[player] += diff.pts;
      g.answerResult = 'correct';
      g.phase = 'answered';
      showFeedback(`✓ ${S.players[player]}`, correct ? '#22c55e' : '#ef4444');
      updateBTGameRender();
      setTimeout(() => btNextRound(), 2200);
    } else {
      g.firstWrong = player;
      g.answerResult = 'wrong';
      // Other player can steal
      const other = player === 0 ? 1 : 0;
      g.buzzer = null;
      g.phase = 'steal';
      showFeedback('✗ FAUX', '#ef4444');
      updateBTGameRender();
    }
  }
}

function btBuzz(player) {
  const g = S.btGame;
  if (g.phase !== 'playing' && g.phase !== 'waiting') return;
  if (g.firstWrong !== null && g.firstWrong === player) return; // already buzzed wrong
  if (g.buzzer !== null) return;
  g.buzzer = player;
  g.currentPlayer = player;
  g.phase = 'buzzed';
  pauseAudio();
  updateBTGameRender();
}

function btNextRound() {
  const g = S.btGame;
  g.idx++;
  if (g.idx >= g.queue.length) { stopAudio(); goto('bt-results'); return; }
  g.phase = 'ready';
  g.answerResult = null;
  g.buzzer = null;
  g.firstWrong = null;
  g.currentPlayer = 0;
  g.replaysLeft = BT_DIFF[S.btCfg.diff].replays;
  g.timeLeft = BT_DIFF[S.btCfg.diff].dur;
  updateBTGameRender();
}

function btSkipSong() {
  stopAudio();
  btNextRound();
}

// ║              LYRICS GAME LOGIC                           ║
// ╚══════════════════════════════════════════════════════════╝
// Split text into non-empty paragraphs (separated by blank lines)
function splitParagraphs(text) {
  // Remove [] and () first
  text = text.replace(/\[[^\]]*\]/g, '').replace(/\([^)]*\)/g, '');
  return text.split(/\n\s*\n/).map(p => p.trim()).filter(p => p.length > 0);
}

function buildLyParagraph(lyric, paragraphIdx) {
  const paragraphs = splitParagraphs(lyric.text);
  const para = paragraphs[paragraphIdx] || '';
  const { tokens, blanks, total } = createBlanks(
    tokenizeLyrics(para),
    LY_DIFF[S.lyCfg.diff].pct
  );
  return { tokens, blanks, total, paragraphs, paragraphIdx };
}

function initLyGame() {
  const avail = S.lyricsFiles.filter(l => l.text);
  if (!avail.length) return;
  const queue = avail.slice().sort(()=>Math.random()-.5);
  const lyric = queue[0];
  const paragraphs = splitParagraphs(lyric.text);
  const { tokens, blanks, total } = createBlanks(
    tokenizeLyrics(paragraphs[0] || ''),
    LY_DIFF[S.lyCfg.diff].pct
  );
  // Match to song
  const linked = S.songs.find(s => norm(s.name.replace(/\.[^.]+$/,'')) === norm(lyric.name) || norm(s.title+' - '+s.artist) === norm(lyric.name));

  S.lyGame = {
    queue, queueIdx: 0,
    lyric, tokens, blanks, total,
    paragraphs, paragraphIdx: 0,
    linked: linked || null,
    mode: S.lyCfg.mode,
    score: 0, totalScore: 0, totalBlanks: 0,
    submitted: false,
    blankIds: Object.keys(blanks).map(Number).sort((a,b)=>a-b),
    qcmCurrentIdx: 0,
    popupBlankId: null,
  };
  goto('ly-game');
}

function lySubmitAll() {
  const g = S.lyGame;
  if (g.submitted) return;
  let correct = 0;
  Object.keys(g.blanks).forEach(id => {
    const b = g.blanks[id];
    const ok = norm(b.userAnswer) === norm(b.answer);
    b.correct = ok;
    if (ok) correct++;
  });
  g.score = correct;
  g.submitted = true;
  renderLyGame();
}

function lyAnswerQCM(blankId, choice) {
  const g = S.lyGame;
  const b = g.blanks[blankId];
  if (b.correct !== null) return;
  b.userAnswer = choice;
  b.correct = norm(choice) === norm(b.answer);
  if (b.correct) g.score++;
  g.popupBlankId = null;

  // Auto advance to next blank
  const idx = g.blankIds.indexOf(blankId);
  if (idx < g.blankIds.length - 1) {
    g.qcmCurrentIdx = idx + 1;
    g.popupBlankId = null;
    // Scroll to next blank
    setTimeout(() => {
      const nextEl = document.getElementById('blank-btn-' + g.blankIds[idx+1]);
      if (nextEl) nextEl.scrollIntoView({ behavior:'smooth', block:'center' });
    }, 300);
  }
  renderLyGame();
}

function lyRevealAll() {
  const g = S.lyGame;
  Object.keys(g.blanks).forEach(id => {
    const b = g.blanks[id];
    if (b.correct === null || b.correct === false) {
      b.correct = false;
      b.revealed = true;
      b.userAnswer = b.answer;
    }
  });
  g.submitted = true;
  renderLyGame();
}

function lyNextSong() {
  const g = S.lyGame;
  g.queueIdx++;
  if (g.queueIdx >= g.queue.length) { goto('ly-results'); return; }
  const lyric = g.queue[g.queueIdx];
  const paragraphs = splitParagraphs(lyric.text);
  const { tokens, blanks, total } = createBlanks(tokenizeLyrics(paragraphs[0] || ''), LY_DIFF[S.lyCfg.diff].pct);
  const linked = S.songs.find(s => norm(s.name.replace(/\.[^.]+$/,'')) === norm(lyric.name));
  g.lyric = lyric; g.tokens = tokens; g.blanks = blanks; g.total = total;
  g.paragraphs = paragraphs; g.paragraphIdx = 0;
  g.linked = linked || null; g.submitted = false; g.score = 0;
  g.blankIds = Object.keys(blanks).map(Number).sort((a,b)=>a-b);
  g.qcmCurrentIdx = 0; g.popupBlankId = null;
  stopAudio();
  renderLyGameFull();
}

function lyNextParagraph() {
  const g = S.lyGame;
  g.totalScore = (g.totalScore || 0) + g.score;
  g.totalBlanks = (g.totalBlanks || 0) + g.total;
  const nextIdx = g.paragraphIdx + 1;
  if (nextIdx >= g.paragraphs.length) { lyNextSong(); return; }
  const { tokens, blanks, total } = createBlanks(
    tokenizeLyrics(g.paragraphs[nextIdx]),
    LY_DIFF[S.lyCfg.diff].pct
  );
  g.tokens = tokens; g.blanks = blanks; g.total = total;
  g.paragraphIdx = nextIdx;
  g.submitted = false; g.score = 0;
  g.blankIds = Object.keys(blanks).map(Number).sort((a,b)=>a-b);
  g.qcmCurrentIdx = 0; g.popupBlankId = null;
  renderLyGameFull();
}

    } else {

    }
  }
  else if (g.phase === 'buzzed') {
    const player = g.buzzer;

    const pColor = player === 0 ? 'var(--p)' : 'var(--c)';
    mainHtml = `
      <div class="text-center mb-3">
        <p style="color:${pColor};font-family:Impact,sans-serif;font-size:1.5rem;letter-spacing:3px">${escHtml(pName)} buzzé !</p>
      </div>
      ${renderAnswerInput(g, song, diff)}`;
  }
  else if (g.phase === 'steal') {
    const other = g.firstWrong === 0 ? 1 : 0;
    mainHtml = `
      <div class="wrong-banner text-center mb-3">✗ Mauvaise réponse ! ${escHtml(S.players[other])}, tu peux voler le point !</div>
      <div class="buzzer-row">
        <button class="buzzer-btn bz-p1" ${other!==0?'disabled':''} onclick="btBuzz(0)">[Z] ${escHtml(S.players[0])}</button>
        <button class="buzzer-btn bz-p2" ${other!==1?'disabled':''} onclick="btBuzz(1)">[M] ${escHtml(S.players[1])}</button>
      </div>
      <div class="text-center mt-3">
        <button class="btn btn-ghost btn-sm" onclick="stopAudio();btNextRound()">⏭ Passer</button>
      </div>`;
  }
  else if (g.phase === 'answered') {
    mainHtml = `<div class="text-center mt-3">
      <button class="btn btn-p btn-lg" onclick="btNextRound()">➡ Suite</button>
    </div>`;
  }

  // Replay / skip row
  let bottomRow = '';
  if (g.phase === 'playing') {
    bottomRow = `<div class="flex justify-between items-center mt-3">
      <button class="btn btn-ghost btn-sm" onclick="btSkipSong()">⏭ Passer</button>
      <span class="badge badge-p">${diff.label}</span>
    </div>`;
  }

  // Solo score
  let soloScore = '';
  if (!isDuel) {
    soloScore = `<div class="text-center text-sm text-dim">Score: <b style="color:var(--y)">${g.scores[0]}</b></div>`;
  }

  return `<div class="screen" id="bt-game-root">
  <!-- Header -->
  <div class="flex justify-between items-center mb-4">
    <button class="btn btn-ghost btn-sm" onclick="if(confirm('Quitter la partie ?')){goto('bt-setup')}">✕</button>
    <span class="text-dim text-sm">${progress}</span>
    <span class="badge badge-p">${diff.icon} ${diff.label}</span>
  </div>

  <!-- Progress -->
  <div class="prog-bar mb-4"><div class="prog-fill" id="bt-prog" style="width:${pct}%"></div></div>

  ${duelHtml}

  <!-- Vinyl + Timer -->
  <div class="flex items-center gap-4 mb-4">
    <div class="vinyl ${g.phase==='playing'?'spin':''}" id="bt-vinyl"></div>
    <div style="flex:1">
      <p class="text-dim text-xs mb-1" style="letter-spacing:2px">MANCHE ${g.idx + 1}</p>
      <p class="bold" style="font-size:1.1rem">${g.phase==='answered'||g.answerResult?escHtml(song.artist)+' — '+escHtml(song.title):'???'}</p>
      ${g.phase!=='answered'&&g.answerResult===null?'<p class="text-dim text-xs">Trouve l\'artiste / le titre</p>':''}
    </div>
    <div class="timer-wrap">
      ${timerSvg}
      <div class="timer-text ${timerClass}" id="bt-timer-text">${Math.ceil(g.timeLeft)}</div>
    </div>

</div>`;
}

function attachBTListeners() {
  // Keyboard support for duel buzzer and QCM
  document.onkeydown = (e) => {
    if (S.screen !== 'bt-game' || !S.btGame) return;
    const g = S.btGame;
    const cfg = S.btCfg;

    // Buzzer keys (duel mode)
    if (cfg.mode === 'duel') {
      if (e.key.toLowerCase() === 'z' && (g.phase === 'playing' || g.phase === 'waiting')) { e.preventDefault(); btBuzz(0); }
      if (e.key.toLowerCase() === 'm' && (g.phase === 'playing' || g.phase === 'waiting')) { e.preventDefault(); btBuzz(1); }
      if (e.key.toLowerCase() === 'z' && g.phase === 'steal' && g.firstWrong !== 0) { e.preventDefault(); btBuzz(0); }
      if (e.key.toLowerCase() === 'm' && g.phase === 'steal' && g.firstWrong !== 1) { e.preventDefault(); btBuzz(1); }
    }

    // QCM: number keys 1-4
    if (cfg.answer === 'qcm' && (g.phase === 'buzzed' || g.phase === 'playing' || g.phase === 'waiting')) {
      const n = parseInt(e.key);
      if (n >= 1 && n <= 4 && g.choices[n-1]) {
        e.preventDefault();
        const btns = document.querySelectorAll('.choice-btn');
        if (btns[n-1]) { btns[n-1].classList.add('active'); }
        btCheckAnswer(g.choices[n-1]);
      }
    }
  };
}

function updateBTGameRender() {
  if (S.screen !== 'bt-game') return;
  document.getElementById('app').innerHTML = renderBTGame();
  attachBTListeners();
}

function updateTimerEl(rem, total) {
  const txt = document.getElementById('bt-timer-text');
  const prog = document.getElementById('bt-timer-prog');
  const vinyl = document.getElementById('bt-vinyl');
  if (txt) {
    const v = Math.ceil(rem);
    txt.textContent = v;
    txt.className = 'timer-text' + (rem < 4 ? ' urgent' : '');
  }
  if (prog) {
    const pct2 = (rem / total) * 100;
    prog.setAttribute('stroke-dasharray', `${pct2} 100`);
  }
  if (vinyl) {
    vinyl.className = 'vinyl' + (rem > 0 ? ' spin' : '');
  }
}

function doReplay() {
  const g = S.btGame;
  if (g.replaysLeft <= 0) return;
  g.replaysLeft--;
  btStartPlay(true);
}

function buildTimerSvg(rem, total) {
  const pct2 = total > 0 ? (rem / total) * 100 : 0;
  const color = rem < 4 ? 'var(--r)' : rem < 10 ? 'var(--y)' : 'var(--c)';
  return `<svg class="timer-svg" width="70" height="70" viewBox="0 0 36 36">
    <circle cx="18" cy="18" r="15.9" fill="none" stroke="var(--bg3)" stroke-width="2.5"/>
    <circle id="bt-timer-prog" cx="18" cy="18" r="15.9" fill="none" stroke="${color}" stroke-width="2.5"
      stroke-dasharray="${pct2} 100" stroke-linecap="round"
      style="transition:stroke-dasharray .1s linear;transform-origin:center;transform:rotate(-90deg)"/>
  </svg>`;
}

function renderLyGame() {
  const g = S.lyGame;
  if (!g) return '<div class="screen"></div>';
  const answered = Object.values(g.blanks).filter(b=>b.correct!==null).length;
  const total = g.total;
  const pct = total > 0 ? (answered / total) * 100 : 0;
  const score = g.score;
  const isDev = g.mode === 'devinette';
  const paraTotal = g.paragraphs ? g.paragraphs.length : 1;
  const paraIdx = g.paragraphIdx || 0;
  const isLastPara = paraIdx >= paraTotal - 1;

  // Audio hint button
  const audioHintHtml = g.linked
    ? `<button class="btn btn-ghost btn-sm" id="ly-audio-btn" onclick="lyToggleAudio()">🎵 Écouter</button>`
    : '';

  // Build lyrics HTML
  const lyricsHtml = buildLyricsHTML(g);

  const progressText = isDev
    ? (g.submitted ? `${score}/${total} correct` : `${answered}/${total} remplis`)
    : `${answered}/${total}`;

  let actionBtns = '';
  if (!g.submitted) {
    if (isDev) {
      actionBtns = `<div class="flex gap-2 mt-4">
        <button class="btn btn-p btn-full" onclick="lySubmitAll()">✔ Valider</button>
        <button class="btn btn-ghost" onclick="lyRevealAll()" style="min-width:100px">👁 Révéler</button>
      </div>`;
    }
  } else {
    const pctScore = total > 0 ? Math.round((score/total)*100) : 0;
    const nextLabel = isLastPara ? '➡ Chanson suivante' : `➡ Strophe suivante (${paraIdx+2}/${paraTotal})`;
    actionBtns = `<div class="reveal-banner mt-4 text-center">
      ${score}/${total} correct • ${pctScore}% ${getScoreEmoji(pctScore)}
    </div>
    <div class="flex gap-2 mt-3 justify-center flex-wrap">
      <button class="btn btn-c btn-lg" onclick="${isLastPara ? 'lyNextSong()' : 'lyNextParagraph()'}">${nextLabel}</button>
      <button class="btn btn-ghost btn-sm" onclick="goto('ly-results')">📊 Fin</button>
    </div>`;
  }

  // QCM: show all-answered button when all done
  if (!isDev && !g.submitted) {
    const allAnswered = Object.values(g.blanks).every(b => b.correct !== null);
    if (allAnswered) {
      const pctScore = total > 0 ? Math.round((score/total)*100) : 0;
      const nextLabel = isLastPara ? '➡ Chanson suivante' : `➡ Strophe suivante (${paraIdx+2}/${paraTotal})`;
      actionBtns = `<div class="reveal-banner mt-4 text-center">
        ${score}/${total} correct • ${pctScore}% ${getScoreEmoji(pctScore)}
      </div>
      <div class="flex gap-2 mt-3 justify-center flex-wrap">
        <button class="btn btn-c btn-lg" onclick="${isLastPara ? 'lyNextSong()' : 'lyNextParagraph()'}">${nextLabel}</button>
        <button class="btn btn-ghost btn-sm" onclick="goto('ly-results')">📊 Fin</button>
      </div>`;
      g.submitted = true;
    }
  }

  return `<div class="screen" id="ly-game-root">
  <div class="flex justify-between items-center mb-3">
    <button class="btn btn-ghost btn-sm" onclick="if(confirm('Quitter ?')){stopAudio();goto('ly-setup')}">✕</button>
    <div class="text-center">
      <p class="text-xs text-dim" style="letter-spacing:2px">${g.queueIdx+1}/${g.queue.length} • Strophe ${paraIdx+1}/${paraTotal}</p>
      <p class="text-sm bold">${escHtml(g.lyric.name)}</p>
    </div>
    ${audioHintHtml || '<div style="width:80px"></div>'}
  </div>

  <div class="flex justify-between items-center mb-2">
    <div class="flex gap-2 items-center">
      <span class="badge badge-c">${LY_DIFF[S.lyCfg.diff].icon} ${LY_DIFF[S.lyCfg.diff].label}</span>
      <span class="badge badge-p">${isDev?'✏️ Devinette':'📋 QCM'}</span>
    </div>
    <span class="text-xs text-dim">${progressText}</span>
  </div>

  <div class="prog-bar mb-3"><div class="prog-fill" style="width:${pct}%"></div></div>

  <div class="lyrics-cont" id="lyrics-cont">
    ${lyricsHtml}
  </div>

  ${actionBtns}
</div>`;
}

function buildLyricsHTML(g) {
  const isDev = g.mode === 'devinette';
  let html = '';
  g.tokens.forEach((tok, i) => {
    if (tok.type === 'newline') {
      html += '<br>';
      return;
    }
    if (tok.type === 'space') {
      html += ' ';
      return;
    }
    if (tok.type === 'punct' || tok.type === 'skip') {
      html += escHtml(tok.val);
      return;
    }
    if (tok.type === 'word' && tok.blank) {
      const b = g.blanks[tok.blankId];
      if (isDev) {
        // Text input blank
        let cls = 'blank-input';
        let val = '';
        let readonly = '';
        if (g.submitted || b.correct !== null) {
          val = b.correct ? b.userAnswer : (b.revealed ? b.answer : b.userAnswer || '');
          if (b.correct) cls += ' correct';
          else if (b.revealed) cls += ' revealed';
          else cls += ' wrong';
          readonly = 'readonly';
        }
        const size = Math.max(4, (b.answer.length + 2));
        html += `<input type="text" class="${cls}" id="blank-${tok.blankId}" data-blank-id="${tok.blankId}"
          value="${escAttr(val)}" ${readonly}
          style="width:${size * 10}px"
          autocomplete="off" spellcheck="false"
          oninput="onBlankInput(${tok.blankId},this.value)"
          onkeydown="onBlankKey(event,${tok.blankId})">`;
      } else {
        // QCM mode: clickable blank
        let cls = 'blank-btn';
        let displayVal = '?';
        if (b.correct !== null) {
          displayVal = b.correct ? b.userAnswer : (b.revealed ? '✓ ' + b.answer : '✗ ' + b.userAnswer + ' / ' + b.answer);
          if (b.correct) cls += ' correct answered';
          else if (b.revealed) cls += ' revealed answered';
          else cls += ' wrong answered';
        }
        html += `<button class="${cls}" id="blank-btn-${tok.blankId}" data-blank-id="${tok.blankId}"
          onclick="toggleLyQCM(${tok.blankId})">${escHtml(displayVal)}</button>`;

        // Show popup if this is the active one
        if (g.popupBlankId === tok.blankId && b.correct === null) {
          html += `<span class="lyric-choices-popup" id="popup-${tok.blankId}">
            ${b.choices.map((c,ci)=>`<button class="choice-btn" style="font-size:.78rem;padding:8px" onclick="lyAnswerQCM(${tok.blankId},'${escAttr(c)}')">
              <span class="choice-key">${ci+1}</span>${escHtml(c)}
            </button>`).join('')}
          </span>`;
        }
      }
    } else {
      html += escHtml(tok.val);
    }
  });
  return html;
}

function attachLyListeners() {
  document.onkeydown = (e) => {
    if (S.screen !== 'ly-game' || !S.lyGame) return;
    const g = S.lyGame;
    if (g.mode === 'qcm' && g.popupBlankId !== null) {
      const b = g.blanks[g.popupBlankId];
      if (b && b.correct === null) {
        const n = parseInt(e.key);
        if (n >= 1 && n <= 4 && b.choices[n-1]) {
          e.preventDefault();
          lyAnswerQCM(g.popupBlankId, b.choices[n-1]);
        }
      }
    }
  };
}

function toggleLyQCM(blankId) {
  const g = S.lyGame;
  if (!g || g.blanks[blankId].correct !== null) return;
  g.popupBlankId = g.popupBlankId === blankId ? null : blankId;
  renderLyGameFull();
  // Scroll to popup
  setTimeout(()=>{
    const el = document.getElementById('blank-btn-' + blankId);
    if (el) el.scrollIntoView({ behavior:'smooth', block:'center' });
  }, 50);
}

function onBlankInput(blankId, val) {
  S.lyGame.blanks[blankId].userAnswer = val;
}

function onBlankKey(e, blankId) {
  const g = S.lyGame;
  if (e.key === 'Enter' || e.key === 'Tab') {
    e.preventDefault();
    // Check this blank
    const b = g.blanks[blankId];
    b.userAnswer = e.target.value;
    const ok = norm(b.userAnswer) === norm(b.answer);
    b.correct = ok;
    if (ok) g.score++;
    // Color the input
    const el = document.getElementById('blank-' + blankId);
    if (el) {
      el.readOnly = true;
      el.className = 'blank-input ' + (ok ? 'correct' : 'wrong');
      if (!ok) {
        // Show correct after 1s
        setTimeout(() => {
          el.value = b.answer;
          el.className = 'blank-input revealed';
          b.revealed = true;
        }, 1000);
      }
    }
    // Focus next blank
    const ids = g.blankIds;
    const i = ids.indexOf(blankId);
    if (i < ids.length - 1) {
      const nextEl = document.getElementById('blank-' + ids[i+1]);
      if (nextEl) nextEl.focus();
    }
  }
}

let lyAudioPlaying = false;
function lyToggleAudio() {
  const g = S.lyGame;
  if (!g || !g.linked) return;
  const btn = document.getElementById('ly-audio-btn');
  if (lyAudioPlaying) {
    stopAudio();
    lyAudioPlaying = false;
    if (btn) btn.textContent = '🎵 Écouter';
  } else {
    playSegment(g.linked.url, S.btCfg.start, 120, {
      onEnd: () => { lyAudioPlaying = false; if(btn) btn.textContent = '🎵 Écouter'; }
    });
    lyAudioPlaying = true;
    if (btn) btn.textContent = '⏹ Stop';
  }
}

// ── LYRICS RESULTS ──
function renderLyResults() {
  const g = S.lyGame;
  if (!g) return '<div class="screen"></div>';
  const totalSongs = g.queueIdx + (g.submitted ? 1 : 0);
  return `<div class="screen text-center">
  <p style="font-size:3rem;margin-bottom:12px">📝</p>
  <h2 class="neon-c mb-4">Résultats — Paroles</h2>
  <div class="card" style="max-width:320px;margin:0 auto 24px">
    <p class="text-dim text-xs mb-2" style="letter-spacing:2px">CHANSONS COMPLÉTÉES</p>
    <p style="font-family:Impact,sans-serif;font-size:3rem" class="neon-c">${totalSongs}</p>
    <p class="text-dim">${g.queue.length} chanson${g.queue.length>1?'s':''} disponibles</p>
  </div>
  <div class="flex gap-3 justify-center flex-wrap">
    <button class="btn btn-c btn-lg" onclick="initLyGame()">🔄 Rejouer</button>
    <button class="btn btn-ghost" onclick="goto('ly-setup')">⚙️ Paramètres</button>
    <button class="btn btn-ghost" onclick="goto('home')">🏠 Menu</button>

</div>`;
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function escAttr(s) {
  if (!s) return '';
  return String(s).replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

function getScoreEmoji(pct) {
  if (pct >= 90) return '🏆 Légendaire !';
  if (pct >= 75) return '🔥 Excellent !';
  if (pct >= 50) return '👍 Pas mal !';
  if (pct >= 25) return '💡 Continue !';
  return '😅 Révise tes classiques !';
}

function showFeedback(text, color) {
  const layer = document.getElementById('feedback-layer');
  if (!layer) return;
  layer.style.display = 'flex';
  layer.innerHTML = `<span class="feedback-txt" style="color:${color}">${text}</span>`;
  setTimeout(() => { layer.style.display = 'none'; layer.innerHTML = ''; }, 800);
}
